version : 2
sources :
  - name : northwind # This is the name of the source, which can be referenced in your models.
    schema: raw_data
    catalog: northwind
    tables:
      - name: suppliers
        description: "The suppliers table contains information about the suppliers who provide products to the company, including their unique identifiers, company names, contact information, and addresses."
        columns:
          - name: supplier_id
            description: "The unique identifier for each supplier."
          - name: company_name
            description: "The name of the supplier's company."
          - name: contact_name
            description: "The name of the primary contact person for the supplier."
          - name: contact_title
            description: "The job title of the primary contact person for the supplier."
          - name: address
            description: "The street address of the supplier's company."
          - name: city
            description: "The city where the supplier's company is located."
          - name: region
            description: "The region or state where the supplier's company is located."
          - name: postal_code
            description: "The postal code for the supplier's company's address."
          - name: country
            description: "The country where the supplier's company is located."
          - name: phone
            description: "The contact phone number for the supplier's company."
          - name: fax
            description: "The fax number for the supplier's company."
          - name: homepage
            description: "The URL for the supplier's company homepage."