version : 2
sources:
  - name : northwind
    schema: raw_data
    catalog: northwind
    tables:
      - name: employees
        description: "The employees table contains information about the employees who work for the company, including their unique identifiers, names, job titles, and contact information."
        columns:
          - name: employee_id
            description: "The unique identifier for each employee."
          - name: last_name
            description: "The last name of the employee."
          - name: first_name
            description: "The first name of the employee."
          - name: title
            description: "The job title of the employee."
          - name: title_of_courtesy
            description: "The courtesy title of the employee (e.g., Mr., Ms., Dr.)."
          - name: birth_date
            description: "The birth date of the employee."
          - name: hire_date
            description: "The date when the employee was hired."
          - name: address
            description: "The street address of the employee's residence."
          - name: city
            description: "The city where the employee resides."
          - name: region
            description: "The region or state where the employee resides."
          - name: postal_code
            description: "The postal code for the employee's residence."
          - name: country
            description: "The country where the employee resides."
          - name: home_phone
            description: "The home phone number of the employee."
          - name: extension
            description: "The phone extension number for the employee at work."
          - name: photo
            description: "A URL or file path to a photo of the employee."
          - name: notes
            description: "Additional notes about the employee."
          - name: reports_to
            description: "The unique identifier of the employee's manager (if applicable)."