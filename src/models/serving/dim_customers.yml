version: 2

models:
  - name: dim_customers
    description: "This table contains customer information."
    columns:
      - name: customer_key
        description: "Surrogate key for the customer dimension."
        tests:
          - unique
          - not_null

      - name: customer_id
        description: "Unique identifier for each customer."
        tests:
          - unique
          - not_null

      - name: company_name
        description: "Name of the customer's company."
      - name: contact_name
        description: "Name of the contact person for the customer."
      - name: contact_title
        description: "Title of the contact person for the customer."
      - name: region
        description: "Region where the customer is located."
      - name: country
        description: "Country where the customer is located."