version : 2
models:
  - name: dim_products
    description: "This table contains product information."
    columns:
      - name: product_key
        description: "Surrogate key for the product dimension."
        tests:
          - unique
          - not_null
      - name: product_id
        description: "Unique identifier for each product."
        tests:
          - unique
          - not_null
      - name: category_name
        description: "Name of the category to which the product belongs."
      - name: supplier_name
        description: "Name of the company that produces the product."
      - name: product_description
        description: "Detailed description of the product."
      - name: product_price
        description: "Price of the product."
        tests:
          - not_null
      - name: product_units_in_stock
        description: "Number of units available in stock."
      - name: product_quantity_per_unit
        description: "Quantity of the product per unit."
      - name: discontinued
        description: "Indicates whether the product is discontinued." 